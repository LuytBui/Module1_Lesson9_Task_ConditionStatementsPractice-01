<body>

<!--Bài 2: Nhập tuổi và in ra kết quả nếu tuổi học sinh đó không đủ điều kiện vào học lớp 10.-->

<script>
  let age = parseInt(prompt("Nhập số tuổi: "));

  let message = (age >=16) ? 'Đủ tuổi vào học lớp 10' : 'Không đủ tuổi vào học lớp 10';
  alert(message);


</script>
</body>
