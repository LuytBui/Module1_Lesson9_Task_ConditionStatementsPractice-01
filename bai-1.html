<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bai 1</title>
</head>
<body>

<!--Bài 1: Nhập vào hai số a và b, và kiểm tra xem a có chia hết cho b hay không-->

<script>
    let a = parseFloat(prompt('Nhập số a:'));
    let b = parseFloat(prompt('Nhập số b:'));
    let message = (a%b === 0)?
        'a chia hết cho b' : 'a không chia hết cho b';
    alert(message);

</script>


</body>
</html>
