<!--Bài 3: Nhập một số nguyên bất kỳ và in kết quả ra màn hình để nói cho người dùng biết số đó là lớn hay nhỏ hơn 0-->

<script>
  let number = parseInt(prompt("Nhập số nguyên:  "));
  let message = (number >= 0)? 'Số nhập vào lớn hơn hoặc bằng 0.' : 'Số nhập vào bé hơn 0.';

  alert(message);

</script>

</body>
